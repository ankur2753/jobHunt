# Use a Playwright-ready base image
FROM mcr.microsoft.com/playwright/python:v1.42.0-jammy

WORKDIR /app

# Install Node.js (required for MCP Playwright server)
RUN apt-get update && apt-get install -y curl && \
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
    apt-get install -y nodejs

# Install the Playwright MCP server globally
RUN npm install -g @modelcontextprotocol/server-playwright

# Copy your requirements and script
COPY requirements.txt .
RUN pip install -r requirements.txt

COPY . .

# Run your script
CMD ["python", "your_mcp_client_script.py"]